<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abraham AI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0d1117;
color:white;
text-align:center;
}

header{
background:#1f6feb;
padding:20px;
}

h1{
font-size:40px;
}

p{
font-size:18px;
}

button{
padding:15px 35px;
font-size:18px;
background:#00c853;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#009624;
}

.box{
padding:30px;
}
</style>
</head>

<body>
<div style="background:#202123;padding:15px;color:white;font-size:25px;font-weight:bold;">
🤖 Abraham AI
</div>

<div id="chat" style="height:400px;overflow:auto;padding:15px;background:#343541;color:white;">
<div style="background:#444654;padding:10px;border-radius:10px;margin-bottom:10px;">
👋 Hello! I am Abraham AI. Ask me anything.
</div>
</div>

<div style="display:flex;padding:10px;background:#202123;">
<input id="question" type="text"
placeholder="Message Abraham AI..."
style="flex:1;padding:15px;font-size:18px;border-radius:10px;border:none;">

<button onclick="send()"
style="margin-left:10px;padding:15px 20px;background:#10a37f;color:white;border:none;border-radius:10px;">
Send
</button>
</div>

<script>
function send(){

let q=document.getElementById("question").value;

if(q=="") return;

let chat=document.getElementById("chat");

chat.innerHTML += "<div style='text-align:right;margin:10px;'><span style='background:#10a37f;padding:10px;border-radius:10px;display:inline-block;'>"+q+"</span></div>";

chat.innerHTML += "<div style='margin:10px;'><span style='background:#444654;padding:10px;border-radius:10px;display:inline-block;'>I'm still learning. Soon I'll answer every question!</span></div>";

document.getElementById("question").value="";

chat.scrollTop=chat.scrollHeight;
}
</script>
</body>
</html>
